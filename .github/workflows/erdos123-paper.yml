name: erdos123-paper

# Keep the committed PDF and verification hashes synchronized with the TeX source.
on:
  push:
    branches: [main]
    paths:
      - 'erdos123/paper/erdos123_lean_journal.tex'
      - '.github/workflows/erdos123-paper.yml'
  pull_request:
    paths:
      - 'erdos123/paper/erdos123_lean_journal.tex'
      - '.github/workflows/erdos123-paper.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-paper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}

      - name: Install LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            latexmk texlive-latex-base texlive-latex-recommended \
            texlive-latex-extra texlive-fonts-recommended

      - name: Build PDF
        run: |
          export SOURCE_DATE_EPOCH="$(git log -1 --format=%ct)"
          cd erdos123/paper
          latexmk -pdf -interaction=nonstopmode -halt-on-error erdos123_lean_journal.tex

      - name: Update manuscript hashes
        run: |
          tex_sha=$(sha256sum erdos123/paper/erdos123_lean_journal.tex | awk '{print $1}')
          pdf_sha=$(sha256sum erdos123/paper/erdos123_lean_journal.pdf | awk '{print $1}')
          python3 - "$tex_sha" "$pdf_sha" <<'PY'
          from pathlib import Path
          import sys

          tex_sha, pdf_sha = sys.argv[1:]
          path = Path('erdos123/VERIFICATION.md')
          lines = []
          for line in path.read_text().splitlines():
              if line.rstrip().endswith('paper/erdos123_lean_journal.tex'):
                  line = f'{tex_sha}  paper/erdos123_lean_journal.tex'
              elif line.rstrip().endswith('paper/erdos123_lean_journal.pdf'):
                  line = f'{pdf_sha}  paper/erdos123_lean_journal.pdf'
              lines.append(line)
          path.write_text('\n'.join(lines) + '\n')
          PY

      - name: Commit rebuilt paper
        run: |
          branch="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add erdos123/paper/erdos123_lean_journal.pdf erdos123/VERIFICATION.md
          if git diff --cached --quiet; then
            echo 'No generated changes.'
            exit 0
          fi
          git commit -m 'erdos123: rebuild paper PDF'
          git pull --rebase origin "$branch"
          git push origin HEAD:"$branch"
