status:
  scope: >-
    Lean 4 + Mathlib formalization of the STATEMENT of the sharp forcing
    conjecture for Erdős #883 (first question), plus complete axiom-free proofs
    of both sharpness assertions: (a) the threshold T(n) = ⌊n/2⌋+⌊n/3⌋−⌊n/6⌋
    cannot be lowered — the multiples of 2 or 3 give an |A| = T(n) whose coprime
    graph is bipartite, hence odd-cycle-free; (b) the ceiling 2q+1,
    q = ⌊n/3⌋−⌊n/6⌋, is exact — all evens plus the q+1 smallest odds give an
    |A| = T(n)+1 whose coprime graph contains C_{2t+1} for every 1 ≤ t ≤ q and
    no longer odd cycle. The forcing direction `erdos883Forcing` is stated as a
    definition and deliberately NOT claimed.
